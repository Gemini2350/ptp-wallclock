services:
  ptp-wallclock:
    image: gemini2350/ptp-wallclock:latest
    # build: .                  # uncomment to build locally instead
    network_mode: host          # required: PTP multicast on ports 319/320
    restart: unless-stopped
    volumes:
      - ptp-wallclock:/var/lib/ptp-wallclock
    # The PTP interface is auto-detected (all interfaces with IPv4).
    # To pin it to one interface instead:
    # environment:
    #   - PTP_WALLCLOCK_IFACE=eth0
    # For PTP hardware timestamping (NIC with a PHC, e.g. Raspberry Pi 5):
    # cap_add:
    #   - NET_ADMIN
    # devices:
    #   - /dev/ptp0:/dev/ptp0

volumes:
  ptp-wallclock:
