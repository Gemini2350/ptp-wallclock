# Build + push the headless ptp-wallclock Docker image to Docker Hub.
#
# Triggers:
#   - every push to main        → :latest + :main-<sha7>
#   - git tag `v*`              → :<tag-without-leading-v> + :latest
#   - manual workflow_dispatch  → same as push
#
# Required GitHub repo secret:
#   - DOCKERHUB_TOKEN  : Docker Hub access token from
#                        https://hub.docker.com/settings/security
#                        (NOT your Docker Hub password)
#
# Hardcoded — change here if you ever rename the Docker Hub repo:
#   - Username  : gemini2350
#   - Image repo: gemini2350/ptp-wallclock

name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # qemu for the arm builds (Raspberry Pi as a headless host)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: gemini2350
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Compute the set of tags to publish based on the trigger.
      #   push-to-main   : :latest + :main-<sha7>
      #   tag-push v1.2  : :1.2 + :latest
      - name: Docker tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: gemini2350/ptp-wallclock
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=branch,suffix=-{{sha}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
